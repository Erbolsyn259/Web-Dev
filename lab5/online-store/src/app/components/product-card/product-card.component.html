<div class="product-card">
  <a [href]="product.link" target="_blank" class="product-link">
    <img [src]="product.image" [alt]="product.name" class="product-image">
  </a>
  
  <div class="product-info">
    <h3 class="product-title">
      <a [href]="product.link" target="_blank">{{ product.name }}</a>
    </h3>
    
    <p class="product-description">{{ product.description }}</p>
    
    <div class="product-price">{{ product.price | number }} ₸</div>
    
    <div class="product-rating">
      <span class="stars">
        <span *ngFor="let star of getRatingStars()">{{ star }}</span>
      </span>
      <span class="rating-value">{{ product.rating }}</span>
    </div>
    
    <div class="product-actions">
      <button class="like-btn" (click)="likeProduct()">
        ❤️ {{ product.likes }}
      </button>
      
      <div class="share-buttons">
        <button (click)="shareOnWhatsApp()" class="share-btn whatsapp">
          <i class="fab fa-whatsapp"></i>
        </button>
        <button (click)="shareOnTelegram()" class="share-btn telegram">
          <i class="fab fa-telegram"></i>
        </button>
      </div>
    </div>
  </div>
</div>
